{% extends 'base.html' %}

{% block title %}
Add AMC Visit
{% endblock %}

{% block content %}

<div class="max-w-5xl mx-auto px-4 py-10">

    <div class="bg-white rounded-[2rem] shadow-xl border border-blue-100 p-8">

        <h1 class="text-4xl font-black text-[#0F4C81]">
            Add AMC Visit
        </h1>

        <p class="mt-2 text-gray-500">
            AMC: {{ amc.amc_id }} | {{ amc.customer.customer_name }}
        </p>

        <form method="POST" class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-5">

            {% csrf_token %}

            <input type="date" name="visit_date" class="border p-4 rounded-2xl" required>

            <input type="text" name="technician_name" placeholder="Technician Name" class="border p-4 rounded-2xl">

            <select name="status" class="border p-4 rounded-2xl" required>
                <option value="PENDING">Pending</option>
                <option value="COMPLETED">Completed</option>
                <option value="MISSED">Missed</option>
                <option value="RESCHEDULED">Rescheduled</option>
            </select>

            <input type="date" name="next_visit_date" class="border p-4 rounded-2xl">

            <textarea name="work_done" placeholder="Work Done" class="border p-4 rounded-2xl md:col-span-2" rows="4"></textarea>

            <textarea name="customer_feedback" placeholder="Customer Feedback" class="border p-4 rounded-2xl md:col-span-2" rows="3"></textarea>

            <textarea name="remarks" placeholder="Remarks" class="border p-4 rounded-2xl md:col-span-2" rows="3"></textarea>

            <button class="md:col-span-2 bg-[#0F4C81] text-white py-4 rounded-2xl font-bold">
                Save Visit
            </button>

        </form>

        <a href="{% url 'amc_detail' amc.id %}" class="inline-block mt-5 text-[#0F4C81] font-bold">
            Back to AMC Detail
        </a>

    </div>

</div>

{% endblock %}
