{% extends 'base.html' %}

{% block title %}
Edit AMC Visit
{% endblock %}

{% block content %}

<div class="max-w-5xl mx-auto px-4 py-10">

    <div class="bg-white rounded-[2rem] shadow-xl border border-blue-100 p-8">

        <h1 class="text-4xl font-black text-[#0F4C81]">
            Edit AMC Visit
        </h1>

        <p class="mt-2 text-gray-500">
            Visit ID: {{ visit.visit_id }}
        </p>

        <form method="POST" class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-5">

            {% csrf_token %}

            <input type="date" name="visit_date" value="{{ visit.visit_date|date:'Y-m-d' }}" class="border p-4 rounded-2xl" required>

            <input type="text" name="technician_name" value="{{ visit.technician_name }}" class="border p-4 rounded-2xl">

            <select name="status" class="border p-4 rounded-2xl" required>
                <option value="PENDING" {% if visit.status == "PENDING" %}selected{% endif %}>Pending</option>
                <option value="COMPLETED" {% if visit.status == "COMPLETED" %}selected{% endif %}>Completed</option>
                <option value="MISSED" {% if visit.status == "MISSED" %}selected{% endif %}>Missed</option>
                <option value="RESCHEDULED" {% if visit.status == "RESCHEDULED" %}selected{% endif %}>Rescheduled</option>
            </select>

            <input type="date" name="next_visit_date" value="{{ visit.next_visit_date|date:'Y-m-d' }}" class="border p-4 rounded-2xl">

            <textarea name="work_done" class="border p-4 rounded-2xl md:col-span-2" rows="4">{{ visit.work_done }}</textarea>

            <textarea name="customer_feedback" class="border p-4 rounded-2xl md:col-span-2" rows="3">{{ visit.customer_feedback }}</textarea>

            <textarea name="remarks" class="border p-4 rounded-2xl md:col-span-2" rows="3">{{ visit.remarks }}</textarea>

            <button class="md:col-span-2 bg-green-600 text-white py-4 rounded-2xl font-bold">
                Update Visit
            </button>

        </form>

        <a href="{% url 'amc_detail' visit.amc.id %}" class="inline-block mt-5 text-[#0F4C81] font-bold">
            Back to AMC Detail
        </a>

    </div>

</div>

{% endblock %}
