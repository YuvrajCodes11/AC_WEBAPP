{% extends 'base.html' %}

{% block title %}
Add Store Transaction
{% endblock %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">

<div class="min-h-screen bg-slate-50 px-4 py-8">

    <div class="max-w-5xl mx-auto">

        <div class="bg-gradient-to-r from-[#0F4C81] to-[#1B6CA8] rounded-3xl p-8 shadow-xl mb-8">

            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

                <div>
                    <h1 class="text-4xl font-black text-white">
                        Add Store Transaction
                    </h1>

                    <p class="text-blue-100 mt-2">
                        Add stock in, stock out, return or adjustment entry.
                    </p>
                </div>

                <a href="{% url 'store_transaction_list' %}"
                   class="bg-white text-[#0F4C81] px-5 py-3 rounded-2xl font-bold">
                    Back
                </a>

            </div>

        </div>

        {% if error %}
        <div class="mb-6 bg-red-50 border border-red-200 text-red-700 px-5 py-4 rounded-2xl">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="bg-white rounded-3xl border shadow-sm p-6">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <div>
                        <label class="block font-bold mb-2">
                            Store Item *
                        </label>

                        <select id="item-select"
                                name="item"
                                required
                                class="w-full border rounded-2xl px-4 py-3">

                            <option value="">
                                Search & Select Item
                            </option>

                            {% for item in items %}
                            <option value="{{ item.id }}">
                                {{ item.item_code }} |
                                {{ item.item_description }}
                                {% if item.size %}
                                    | {{ item.size }}
                                {% endif %}
                                | {{ item.item_type_display }}
                                | Stock: {{ item.current_stock }} {{ item.get_unit_display }}
                            </option>
                            {% endfor %}

                        </select>
                    </div>

                    <div>
                        <label class="block font-bold mb-2">
                            Transaction Type *
                        </label>

                        <select name="transaction_type"
                                required
                                class="w-full border rounded-2xl px-4 py-3">

                            <option value="">Select Type</option>

                            {% for key,value in transaction_type_choices %}
                            <option value="{{ key }}">
                                {{ value }}
                            </option>
                            {% endfor %}

                        </select>
                    </div>

                    <div>
                        <label class="block font-bold mb-2">
                            Purpose *
                        </label>

                        <select name="purpose"
                                required
                                class="w-full border rounded-2xl px-4 py-3">

                            <option value="">Select Purpose</option>

                            {% for key,value in purpose_choices %}
                            <option value="{{ key }}">
                                {{ value }}
                            </option>
                            {% endfor %}

                        </select>
                    </div>

                    <div>
                        <label class="block font-bold mb-2">
                            Project
                        </label>

                        <select id="project-select"
                                name="project"
                                class="w-full border rounded-2xl px-4 py-3">

                            <option value="">
                                No Project
                            </option>

                            {% for project in projects %}
                            <option value="{{ project.id }}">
                                {{ project.project_id }} - {{ project.site_name }}
                            </option>
                            {% endfor %}

                        </select>
                    </div>

                    <div>
                        <label class="block font-bold mb-2">
                            Quantity *
                        </label>

                        <input type="number"
                               step="0.01"
                               min="0"
                               name="quantity"
                               required
                               placeholder="Example: 50"
                               class="w-full border rounded-2xl px-4 py-3">
                    </div>

                    <div>
                        <label class="block font-bold mb-2">
                            Issued To
                        </label>

                        <input type="text"
                               name="issued_to"
                               placeholder="Technician / Site Engineer"
                               class="w-full border rounded-2xl px-4 py-3">
                    </div>

                    <div>
                        <label class="block font-bold mb-2">
                            AMC Customer Name
                        </label>

                        <input type="text"
                               name="amc_customer_name"
                               placeholder="For AMC work only"
                               class="w-full border rounded-2xl px-4 py-3">
                    </div>

                    <div>
                        <label class="block font-bold mb-2">
                            Warranty Customer Name
                        </label>

                        <input type="text"
                               name="warranty_customer_name"
                               placeholder="For warranty work only"
                               class="w-full border rounded-2xl px-4 py-3">
                    </div>

                    <div>
                        <label class="block font-bold mb-2">
                            Service Customer Name
                        </label>

                        <input type="text"
                               name="service_customer_name"
                               placeholder="For service work only"
                               class="w-full border rounded-2xl px-4 py-3">
                    </div>

                    <div>
                        <label class="block font-bold mb-2">
                            Invoice / File
                        </label>

                        <input type="file"
                               name="invoice_file"
                               class="w-full border rounded-2xl px-4 py-3 bg-white">
                    </div>

                </div>

                <div class="mt-6">
                    <label class="block font-bold mb-2">
                        Description
                    </label>

                    <textarea name="description"
                              rows="4"
                              placeholder="Transaction description"
                              class="w-full border rounded-2xl px-4 py-3"></textarea>
                </div>

            </div>

            <div class="mt-6 flex gap-3">

                <button type="submit"
                        class="bg-[#0F4C81] text-white px-8 py-4 rounded-2xl font-black">
                    Save Transaction
                </button>

                <a href="{% url 'store_transaction_list' %}"
                   class="bg-slate-200 text-slate-700 px-8 py-4 rounded-2xl font-black">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        new TomSelect("#item-select", {
            create: false,
            maxOptions: 1000,
            sortField: {
                field: "text",
                direction: "asc"
            },
            placeholder: "Search Item Name, Code, Size, Stock..."
        });

        new TomSelect("#project-select", {
            create: false,
            maxOptions: 1000,
            sortField: {
                field: "text",
                direction: "asc"
            },
            placeholder: "Search Project..."
        });
    });
</script>

{% endblock %}
