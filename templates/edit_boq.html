{% extends 'base.html' %}

{% block title %}
Edit BOQ
{% endblock %}

{% block content %}

<div class="min-h-screen bg-slate-50 px-4 py-8">

    <div class="max-w-5xl mx-auto">

        <div class="bg-gradient-to-r from-[#0F4C81] to-[#1B6CA8] rounded-3xl p-8 shadow-xl mb-8">

            <div class="flex justify-between items-center">

                <div>
                    <h1 class="text-4xl font-black text-white">
                        Edit BOQ
                    </h1>

                    <p class="text-blue-100 mt-2">
                        Update BOQ information and status.
                    </p>
                </div>

                <a href="{% url 'boq_detail' boq.id %}"
                   class="bg-white text-[#0F4C81] px-5 py-3 rounded-2xl font-bold">
                    Back
                </a>

            </div>

        </div>

        {% if error %}
        <div class="mb-6 bg-red-50 border border-red-200 text-red-700 px-5 py-4 rounded-2xl">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                    <div>
                        <label class="block font-bold mb-2">
                            Project
                        </label>

                        <select name="project"
                                class="w-full border border-slate-300 rounded-2xl px-4 py-3">

                            {% for project in projects %}
                            <option value="{{ project.id }}"
                                    {% if boq.project.id == project.id %}selected{% endif %}>

                                {{ project.project_id }}
                                -
                                {{ project.site_name }}

                            </option>
                            {% endfor %}

                        </select>
                    </div>

                    <div>
                        <label class="block font-bold mb-2">
                            BOQ Status
                        </label>

                        <select name="status"
                                class="w-full border border-slate-300 rounded-2xl px-4 py-3">

                            {% for key, value in status_choices %}
                            <option value="{{ key }}"
                                    {% if boq.status == key %}selected{% endif %}>
                                {{ value }}
                            </option>
                            {% endfor %}

                        </select>
                    </div>

                </div>

                <div class="mt-5">

                    <label class="block font-bold mb-2">
                        BOQ Title
                    </label>

                    <input type="text"
                           name="title"
                           value="{{ boq.title }}"
                           class="w-full border border-slate-300 rounded-2xl px-4 py-3">

                </div>

                <div class="mt-5">

                    <label class="block font-bold mb-2">
                        Remarks
                    </label>

                    <textarea name="remarks"
                              rows="4"
                              class="w-full border border-slate-300 rounded-2xl px-4 py-3">{{ boq.remarks }}</textarea>

                </div>

            </div>

            <div class="mt-6 flex gap-3">

                <button type="submit"
                        class="bg-[#0F4C81] text-white px-8 py-4 rounded-2xl font-black">

                    Update BOQ

                </button>

                <a href="{% url 'boq_detail' boq.id %}"
                   class="bg-slate-200 text-slate-700 px-8 py-4 rounded-2xl font-black">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
