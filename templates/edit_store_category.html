{% extends 'base.html' %}

{% block title %}
Edit Store Category
{% endblock %}

{% block content %}

<div class="min-h-screen bg-slate-50 px-4 py-8">

    <div class="max-w-3xl mx-auto">

        <div class="bg-gradient-to-r from-[#0F4C81] to-[#1B6CA8] rounded-3xl p-8 shadow-xl mb-8">

            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

                <div>
                    <h1 class="text-4xl font-black text-white">
                        Edit Store Category
                    </h1>

                    <p class="text-blue-100 mt-2">
                        Update material category name.
                    </p>
                </div>

                <a href="{% url 'store_category_list' %}"
                   class="bg-white text-[#0F4C81] px-5 py-3 rounded-2xl font-bold">
                    Back
                </a>

            </div>

        </div>

        {% if error %}
        <div class="mb-6 bg-red-50 border border-red-200 text-red-700 px-5 py-4 rounded-2xl font-bold">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6">

                <label class="block text-sm font-bold text-slate-700 mb-2">
                    Category Name *
                </label>

                <input type="text"
                       name="category_name"
                       value="{{ category.category_name }}"
                       required
                       class="w-full border border-slate-300 rounded-2xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-[#0F4C81]">

            </div>

            <div class="mt-6 flex gap-3">

                <button type="submit"
                        class="bg-[#0F4C81] text-white px-8 py-4 rounded-2xl font-black">
                    Update Category
                </button>

                <a href="{% url 'store_category_list' %}"
                   class="bg-slate-200 text-slate-700 px-8 py-4 rounded-2xl font-black">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
