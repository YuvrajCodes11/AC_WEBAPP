{% extends 'base.html' %}

{% block title %}
Add Service Complaint
{% endblock %}

{% block content %}

<div class="max-w-5xl mx-auto px-4 py-10">

    <div class="bg-white rounded-[2rem] shadow-xl border border-blue-100 p-8">

        <h1 class="text-4xl font-black text-[#0F4C81]">
            Add Service Complaint
        </h1>

        <p class="mt-2 text-gray-500">
            Select customer. Customer type will come from customer category.
        </p>

        <form method="POST" class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-5">

            {% csrf_token %}

            <input
                type="date"
                name="complaint_date"
                class="border p-4 rounded-2xl"
                required
            >

            <select name="customer" class="border p-4 rounded-2xl" required>
                <option value="">Select Customer</option>

                {% for customer in customers %}
                <option value="{{ customer.id }}">
                    {{ customer.customer_name }} | {{ customer.get_customer_category_display }}
                </option>
                {% endfor %}
            </select>

            <input
                type="text"
                name="contact_number"
                placeholder="Contact Number"
                class="border p-4 rounded-2xl"
                required
            >

            <input
                type="text"
                name="technician_name"
                placeholder="Technician Name"
                class="border p-4 rounded-2xl"
            >

            <select name="status" class="border p-4 rounded-2xl" required>
                <option value="PENDING">Pending</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="COMPLETED">Completed</option>
                <option value="HOLD">Hold</option>
                <option value="CANCELLED">Cancelled</option>
            </select>

            <input
                type="date"
                name="service_completed_date"
                class="border p-4 rounded-2xl"
            >

            <textarea
                name="customer_address"
                placeholder="Customer Address"
                class="border p-4 rounded-2xl md:col-span-2"
                rows="3"
            ></textarea>

            <textarea
                name="nature_of_complaint"
                placeholder="Nature of Complaint"
                class="border p-4 rounded-2xl md:col-span-2"
                rows="4"
                required
            ></textarea>

            <textarea
                name="remarks"
                placeholder="Remarks"
                class="border p-4 rounded-2xl md:col-span-2"
                rows="3"
            ></textarea>

            <button class="md:col-span-2 bg-[#0F4C81] text-white py-4 rounded-2xl font-bold">
                Save Complaint
            </button>

        </form>

        <a href="{% url 'service_list' %}" class="inline-block mt-5 text-[#0F4C81] font-bold">
            Back to Service List
        </a>

    </div>

</div>

{% endblock %}
