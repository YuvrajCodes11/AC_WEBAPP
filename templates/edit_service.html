{% extends 'base.html' %}

{% block title %}
Edit Service Complaint
{% endblock %}

{% block content %}

<div class="max-w-5xl mx-auto px-4 py-10">

    <div class="bg-white rounded-[2rem] shadow-xl border border-blue-100 p-8">

        <h1 class="text-4xl font-black text-[#0F4C81]">
            Edit Service Complaint
        </h1>

        <p class="mt-2 text-gray-500">
            Complaint ID: {{ complaint.complaint_id }}
        </p>

        <form method="POST" class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-5">

            {% csrf_token %}

            <input
                type="date"
                name="complaint_date"
                value="{{ complaint.complaint_date|date:'Y-m-d' }}"
                class="border p-4 rounded-2xl"
                required
            >

            <select name="customer" class="border p-4 rounded-2xl" required>
                {% for customer in customers %}

                <option value="{{ customer.id }}" {% if complaint.customer.id == customer.id %}selected{% endif %}>
                    {{ customer.customer_name }}
                </option>

                {% endfor %}
            </select>

            <input
                type="text"
                name="contact_number"
                value="{{ complaint.contact_number }}"
                class="border p-4 rounded-2xl"
                required
            >

            <select name="service_type" class="border p-4 rounded-2xl" required>
                <option value="AMC" {% if complaint.service_type == "AMC" %}selected{% endif %}>AMC</option>
                <option value="WARRANTY" {% if complaint.service_type == "WARRANTY" %}selected{% endif %}>Warranty</option>
                <option value="PAID" {% if complaint.service_type == "PAID" %}selected{% endif %}>Paid Service</option>
                <option value="GENERAL" {% if complaint.service_type == "GENERAL" %}selected{% endif %}>General Complaint</option>
            </select>

            <input
                type="text"
                name="technician_name"
                value="{{ complaint.technician_name }}"
                class="border p-4 rounded-2xl"
            >

            <select name="status" class="border p-4 rounded-2xl" required>
                <option value="PENDING" {% if complaint.status == "PENDING" %}selected{% endif %}>Pending</option>
                <option value="IN_PROGRESS" {% if complaint.status == "IN_PROGRESS" %}selected{% endif %}>In Progress</option>
                <option value="COMPLETED" {% if complaint.status == "COMPLETED" %}selected{% endif %}>Completed</option>
                <option value="HOLD" {% if complaint.status == "HOLD" %}selected{% endif %}>Hold</option>
                <option value="CANCELLED" {% if complaint.status == "CANCELLED" %}selected{% endif %}>Cancelled</option>
            </select>

            <textarea
                name="customer_address"
                class="border p-4 rounded-2xl md:col-span-2"
                rows="3"
            >{{ complaint.customer_address }}</textarea>

            <textarea
                name="nature_of_complaint"
                class="border p-4 rounded-2xl md:col-span-2"
                rows="4"
                required
            >{{ complaint.nature_of_complaint }}</textarea>

            <input
                type="date"
                name="service_completed_date"
                value="{{ complaint.service_completed_date|date:'Y-m-d' }}"
                class="border p-4 rounded-2xl md:col-span-2"
            >

            <textarea
                name="remarks"
                class="border p-4 rounded-2xl md:col-span-2"
                rows="3"
            >{{ complaint.remarks }}</textarea>

            <button class="md:col-span-2 bg-green-600 text-white py-4 rounded-2xl font-bold">
                Update Complaint
            </button>

        </form>

        <a href="{% url 'service_detail' complaint.id %}" class="inline-block mt-5 text-[#0F4C81] font-bold">
            Back to Complaint Detail
        </a>

    </div>

</div>

{% endblock %}
